{% extends 'base.html' %}
{% block title %}Sign In — DataLens{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="brand-icon large">◈</span>
      <h1>DataLens</h1>
      <p>Your interactive data dashboard platform</p>
    </div>
    <form method="POST" class="auth-form">
      {% for cat, msg in get_flashed_messages(with_categories=true) %}
        <div class="form-error">{{ msg }}</div>
      {% endfor %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autofocus required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required />
      </div>
      <button type="submit" class="btn-primary btn-full">Sign In</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
